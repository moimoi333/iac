# deploy.yaml — Roadmap IAC sur k3s
# Prérequis : secret d'authentification au registry GitLab
#
#   kubectl create secret docker-registry gitlab-registry \
#     -n iac \
#     --docker-server=registry.gitlab.com \
#     --docker-username=<user> \
#     --docker-password=<token>
#
# Déploiement :
#   kubectl apply -f deploy.yaml

---
apiVersion: v1
kind: Namespace
metadata:
  name: iac

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iac-data
  namespace: iac
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 256Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iac-roadmap
  namespace: iac
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iac-roadmap
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: iac-roadmap
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: app
          image: registry.gitlab.com/VOTRE_NAMESPACE/iac:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: iac-data

---
apiVersion: v1
kind: Service
metadata:
  name: iac-roadmap
  namespace: iac
spec:
  type: LoadBalancer
  selector:
    app: iac-roadmap
  ports:
    - port: 80
      targetPort: 3000
